<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Practice Set 1</title>
  <link rel="stylesheet" href="styles.css" />

  <style> /* Q3: blue button using <style> tag */
    .btn-style {
      background-color: blue;
      color: white;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
    }
  </style>

</head>
<body>
  <!-- Q1 -->
  <div id="box">This is a simple blue box.</div>

  <!-- Q2 -->
  <h1 class="heading">Heading 1</h1>
  <h2 class="heading">Heading 2</h2>
  <h3 class="heading">Heading 3</h3>

  <!-- Q3: three buttons demonstrating three methods -->
  <button class="btn-external">Green (external stylesheet)</button>
  <button class="btn-style">Blue (style tag)</button>
  <button style="background-color: pink;"> Pink (inline style)</button>

</body>
</html>
