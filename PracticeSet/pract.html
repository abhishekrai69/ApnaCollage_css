<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header & Navbar Styles */
        header {
            background-color: #333;
            padding: 0;
        }

        nav {
            background-color: #333;
            padding: 15px 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #4CAF50;
        }

        /* Content Area Styles */
        .content {
            flex: 1;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            min-height: 400px;
        }

        /* Q1, Q2, Q3: Div Styles */
        .div-box {
            width: 150px;
            height: 150px;
            border: 2px solid black; /* Q2: Add borders */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
        }

        /* Q3: Different background colors with 0.5 opacity */
        .div-1 {
            background-color: rgba(255, 0, 0, 0.5);
        }

        .div-2 {
            background-color: rgba(0, 128, 255, 0.5);
        }

        .div-3 {
            background-color: rgba(0, 200, 100, 0.5);
        }

        .div-4 {
            background-color: rgba(255, 165, 0, 0.5);
        }

        .div-5 {
            background-color: rgba(128, 0, 128, 0.5);
        }

        .div-6 {
            background-color: rgba(255, 192, 203, 0.5);
        }

        .div-7 {
            background-color: rgba(0, 255, 255, 0.5);
        }

        .div-8 {
            background-color: rgba(255, 255, 0, 0.5);
        }

        .div-9 {
            background-color: rgba(128, 128, 128, 0.5);
        }

        .div-10 {
            background-color: rgba(165, 42, 42, 0.5);
        }

        /* Footer Styles */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- Header with Navbar (Q1) -->
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Content Area with 10 Divs -->
    <div class="content">
        <div class="div-box div-1">Div 1</div>
        <div class="div-box div-2">Div 2</div>
        <div class="div-box div-3">Div 3</div>
        <div class="div-box div-4">Div 4</div>
        <div class="div-box div-5">Div 5</div>
        <div class="div-box div-6">Div 6</div>
        <div class="div-box div-7">Div 7</div>
        <div class="div-box div-8">Div 8</div>
        <div class="div-box div-9">Div 9</div>
        <div class="div-box div-10">Div 10</div>
    </div>

    <!-- Footer (Q1) -->
    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>
</body>
</html>
